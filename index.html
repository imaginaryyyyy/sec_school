<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SG G3 AI Tutor</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; }
        .view { display: none; }
        .active { display: block; }
        button { padding: 12px 20px; margin: 5px; cursor: pointer; background: #0056b3; color: white; border: none; border-radius: 4px; display: block; width: 100%; text-align: left; }
        .back-btn { background: #6c757d; width: auto; margin-bottom: 20px; }
    </style>
</head>
<body>

<div id="app">
    <h1>SG G3 AI Tutor</h1>
    <button id="back-btn" class="back-btn" onclick="goBack()" style="display:none;">← Back</button>
    
    <div id="view-level" class="view active">
        <h2>Select Level</h2>
        <button onclick="showSubjects('Sec 1')">Sec 1</button>
        <button onclick="showSubjects('Sec 2')">Sec 2</button>
        <button onclick="showSubjects('Sec 3')">Sec 3</button>
        <button onclick="showSubjects('Sec 4')">Sec 4</button>
    </div>

    <div id="view-subject" class="view">
        <h2 id="subject-header">Select Subject</h2>
        <div id="subject-list"></div>
    </div>

    <div id="view-topic" class="view">
        <h2 id="topic-header">Select Topic</h2>
        <div id="topic-list"></div>
    </div>
</div>

<script>
    const curriculum = {
        'Sec 1': { 
            'Math': ['Primes, HCF, LCM', 'Real Numbers', 'Approximation', 'Algebraic Expressions', 'Linear Equations', 'Linear Inequalities', 'Functions', 'Number Patterns', 'Percentage', 'Ratio and Proportion', 'Speed', 'Polygons', 'Angles in Geometry', 'Statistics'],
            'Science': ['Introduction to Science', 'Measurement', 'Diversity of Materials', 'Separation Techniques', 'Solutions', 'Elements & Compounds', 'Cells', 'Human Digestive System', 'Transport in Organisms', 'Human Sexual Reproduction']
        },
        'Sec 2': { 
            'Math': ['Expansion and Factorisation', 'Simultaneous Equations', 'Expansion of Algebraic Expressions', 'Laws of Indices', 'Congruence and Similarity', 'Pythagoras Theorem', 'Mensuration', 'Trigonometric Ratios', 'Probability', 'Statistical Diagrams'],
            'Science': ['Interactions (Forces)', 'Energy', 'Work, Energy, Power', 'Current of Electricity', 'Effects of Heat', 'Light', 'Chemical Reactions', 'Respiration', 'Transport in Plants', 'Human Circulatory System']
        },
        // Sec 3 & 4 include deeper topics like AMath Calculus and Physics Electromagnetism
        'Sec 3': {
            'EMath': ['Indices', 'Standard Form', 'Quadratic Equations', 'Functions', 'Coordinate Geometry', 'Congruence', 'Similarity', 'Trigonometry', 'Mensuration', 'Vectors', 'Set Language', 'Probability', 'Data Analysis'],
            'AMath': ['Quadratic Functions', 'Equations & Inequalities', 'Surds', 'Polynomials', 'Partial Fractions', 'Binomial Theorem', 'Coordinate Geometry', 'Linear Law', 'Trigonometric Functions', 'Proofs', 'Circular Measure', 'Differentiation']
        }
        // ... (Expand as needed for Sec 4 and other subjects)
    };

    // System Prompt for your AI
    const SYSTEM_PROMPT = "You are a professional Singapore MOE G3 tutor. When generating questions, ensure they reflect the rigor of O-Level examinations. Provide step-by-step solutions only after the student attempts the question.";

    let historyStack = ['view-level'];
    let selectedLevel = '', selectedSubject = '';

    function showView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('back-btn').style.display = (id === 'view-level') ? 'none' : 'block';
    }

    function showSubjects(level) {
        selectedLevel = level;
        historyStack.push('view-subject');
        const list = document.getElementById('subject-list');
        list.innerHTML = '';
        Object.keys(curriculum[level]).forEach(sub => {
            const btn = document.createElement('button');
            btn.innerText = sub;
            btn.onclick = () => showTopics(sub);
            list.appendChild(btn);
        });
        showView('view-subject');
    }

    function showTopics(sub) {
        selectedSubject = sub;
        historyStack.push('view-topic');
        const list = document.getElementById('topic-list');
        list.innerHTML = '';
        curriculum[selectedLevel][sub].forEach(top => {
            const btn = document.createElement('button');
            btn.innerText = top;
            btn.onclick = () => alert(`Generating 10 questions for ${top}. \nSystem Prompt: ${SYSTEM_PROMPT}`);
            list.appendChild(btn);
        });
        showView('view-topic');
    }

    function goBack() {
        historyStack.pop();
        const prev = historyStack[historyStack.length - 1];
        showView(prev);
    }
</script>
</body>
</html>
