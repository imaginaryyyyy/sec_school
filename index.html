<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SG G3 AI Tutor</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; }
        .view { display: none; }
        .active { display: block; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; background: #0056b3; color: white; border: none; border-radius: 4px; }
        .back-btn { background: #6c757d; }
        #chat-section { margin-top: 40px; border-top: 2px solid #0056b3; padding-top: 20px; }
    </style>
</head>
<body>

<div id="app">
    <h1>SG G3 AI Tutor</h1>
    <div id="nav-controls"><button id="back-btn" class="back-btn" onclick="goBack()" style="display:none;">Back</button></div>
    
    <div id="view-level" class="view active">
        <h2>Select Level</h2>
        <button onclick="navigate('subject', 'Sec 1')">Sec 1</button>
        <button onclick="navigate('subject', 'Sec 2')">Sec 2</button>
        <button onclick="navigate('subject', 'Sec 3')">Sec 3</button>
        <button onclick="navigate('subject', 'Sec 4')">Sec 4</button>
    </div>

    <div id="view-subject" class="view">
        <h2 id="subject-header">Select Subject</h2>
        <div id="subject-list"></div>
    </div>

    <div id="view-topic" class="view">
        <h2 id="topic-header">Select Topic</h2>
        <div id="topic-list"></div>
    </div>
</div>

<script>
    const curriculum = {
        'Sec 1': { 
            'Math': ['Numbers', 'Algebraic Expressions', 'Linear Equations', 'Functions and Graphs', 'Geometry', 'Statistics'],
            'Science': ['Cells', 'Matter', 'Chemical Changes', 'Diversity of Organisms', 'Energy'] 
        },
        'Sec 2': { 
            'Math': ['Expansion and Factorisation', 'Simultaneous Equations', 'Congruence and Similarity', 'Pythagoras Theorem', 'Mensuration'],
            'Science': ['Human Digestive System', 'Transport System in Living Organisms', 'Light', 'Electricity', 'Chemical Reactions'] 
        },
        'Sec 3': {
            'EMath': ['Indices', 'Quadratic Equations', 'Graphs of Functions', 'Trigonometry', 'Vectors'],
            'AMath': ['Quadratic Functions', 'Equations and Inequalities', 'Surds', 'Polynomials', 'Coordinate Geometry'],
            'Physics': ['Physical Quantities', 'Kinematics', 'Dynamics', 'Mass Weight Density', 'Turning Effects'],
            'Chemistry': ['Kinetic Particle Theory', 'Atomic Structure', 'Chemical Bonding', 'Chemical Formulae', 'Acids and Bases'],
            'Computing': ['Data Representation', 'Algorithms', 'Programming Fundamentals', 'Computer Systems']
        },
        'Sec 4': {
            'EMath': ['Matrices', 'Probability', 'Statistics', 'Circle Properties', 'Construction'],
            'AMath': ['Logarithms', 'Differentiation', 'Integration', 'Trigonometric Functions'],
            'Physics': ['Electricity', 'Electromagnetism', 'Waves', 'Sound', 'Thermal Properties'],
            'Chemistry': ['Redox Reactions', 'Periodic Table', 'Organic Chemistry', 'Energy Changes'],
            'Computing': ['Networks', 'Security', 'Database Design']
        }
    };

    let historyStack = ['view-level'];

    function navigate(viewId, data) {
        historyStack.push('view-' + viewId);
        showView('view-' + viewId, data);
    }

    function showView(id, data) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('back-btn').style.display = (id === 'view-level') ? 'none' : 'block';
        
        // logic to populate menus...
        console.log("Navigating to:", id, data);
    }

    function goBack() {
        historyStack.pop();
        const prev = historyStack[historyStack.length - 1];
        showView(prev);
    }
</script>
</body>
</html>
